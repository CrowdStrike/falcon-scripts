# Reusable workflow for Linux Molecule tests
# Centralizes all Molecule test logic with environment-based secret protection
#
# SECURITY: This workflow requires secrets to be configured in the 'molecule-testing'
# GitHub Environment with required reviewers enabled. For push/schedule events,
# secrets are accessed from repository level. For pull_request events (including
# forks), the environment protection gates secret access pending approval.
name: "Reusable: Molecule Test (Linux)"

on:
  workflow_call:
    inputs:
      distros:
        description: 'JSON array of distro configurations'
        required: true
        type: string
      collection_role:
        description: 'The Molecule collection role to test'
        required: true
        type: string
      pr_sha:
        description: 'PR head SHA for checkout (empty for push/schedule)'
        required: false
        type: string
        default: ''
      pr_repo:
        description: 'PR head repo for checkout (empty for push/schedule)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  molecule:
    name: ${{ matrix.distro.name }}-${{ inputs.collection_role }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.pr_sha != '' && 'molecule-testing' || '' }}
    env:
      PY_COLORS: 1
      ANSIBLE_FORCE_COLOR: 1
      FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
      FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
      AWS_REGION: "us-west-1"
      MOLECULE_VPC_SUBNET_ID: ${{ secrets.MOLECULE_VPC_SUBNET_ID }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJSON(inputs.distros) }}

    steps:
      - name: Check out code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.pr_sha || github.sha }}
          repository: ${{ inputs.pr_repo || github.repository }}
          persist-credentials: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          role-session-name: github-actions-molecule-ansible
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/workflows/reusable-molecule-test-linux.yml'

      - name: Install dependencies
        run: |
          sudo apt install apt-transport-https ca-certificates curl software-properties-common libssl-dev
          python -m pip install --upgrade pip
          pip install molecule "molecule-plugins[ec2]" ansible ansible-core==2.16.7 ansible-lint boto3 botocore

      - name: Run role tests
        id: molecule-role-test
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        env:
          MOLECULE_INSTANCE_NAME: ${{ matrix.distro.name }}-${{ inputs.collection_role }}
          MOLECULE_IMAGE_OWNER: ${{ matrix.distro.image_owner }}
          MOLECULE_IMAGE_ARCH: ${{ matrix.distro.image_arch }}
          MOLECULE_IMAGE_NAME: ${{ matrix.distro.image_name }}
          MOLECULE_INSTANCE_TYPE: ${{ matrix.distro.instance_type }}
          MOLECULE_REGION: ${{ env.AWS_REGION }}
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_on: error
          command: >-
            molecule --version &&
            ansible --version &&
            molecule --debug test --destroy never -s "${{ inputs.collection_role }}"
        continue-on-error: true

      - name: Ensure instances are destroyed
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        env:
          MOLECULE_INSTANCE_NAME: ${{ matrix.distro.name }}-${{ inputs.collection_role }}
          MOLECULE_IMAGE_OWNER: ${{ matrix.distro.image_owner }}
          MOLECULE_IMAGE_ARCH: ${{ matrix.distro.image_arch }}
          MOLECULE_IMAGE_NAME: ${{ matrix.distro.image_name }}
          MOLECULE_INSTANCE_TYPE: ${{ matrix.distro.instance_type }}
          MOLECULE_REGION: ${{ env.AWS_REGION }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: >-
            molecule --version &&
            ansible --version &&
            molecule --debug destroy -s "${{ inputs.collection_role }}"

      - name: Assert molecule tests passed
        uses: nick-fields/assert-action@aa0067e01f0f6545c31755d6ca128c5a3a14f6bf # v2.0.0
        with:
          expected: success
          actual: ${{ steps.molecule-role-test.outcome }}
