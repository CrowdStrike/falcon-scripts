name: "CI: container_sensor_pull"
on:
  schedule:
    - cron: '0 0 * * *'

  push:
    paths:
      - 'bash/containers/falcon-container-sensor-pull/**'
      - '.github/workflows/container_sensor_pull.yml'

  pull_request:
    paths:
      - 'bash/containers/falcon-container-sensor-pull/**'
      - '.github/workflows/container_sensor_pull.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Shellcheck
        run: |
          shellcheck --version
          shellcheck bash/containers/falcon-container-sensor-pull/falcon-container-sensor-pull.sh

  container-test:
    name: Container Test
    needs: validate
    uses: ./.github/workflows/reusable-container-sensor-pull.yml
    with:
      sensor_types: |
        [
          {"type": "falcon-container", "cli_arg": ""},
          {"type": "falcon-sensor", "cli_arg": "-n"},
          {"type": "falcon-kac", "cli_arg": "--kubernetes-admission-controller"}
        ]
      pr_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
      pr_repo: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || '' }}
    secrets: inherit
