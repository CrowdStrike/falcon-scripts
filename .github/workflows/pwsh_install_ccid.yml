name: "CI: pwsh_install_ccid"
on:
  schedule:
    - cron: '0 2 * * *'

  push:
    paths:
      - 'molecule/pwsh_install_ccid/**'
      - 'powershell/install/**'
      - '.github/workflows/pwsh_install_ccid.yml'

  pull_request:
    paths:
      - 'molecule/pwsh_install_ccid/**'
      - 'powershell/install/**'
      - '.github/workflows/pwsh_install_ccid.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $scripts = Get-ChildItem -Path powershell/install -Filter *.ps1 -Recurse
          foreach ($script in $scripts) {
            $null = [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$null, [ref]$errors)
            if ($errors.Count -gt 0) {
              Write-Error "Syntax errors in $($script.FullName):"
              $errors | ForEach-Object { Write-Error $_.ToString() }
              exit 1
            }
          }
          Write-Host "All PowerShell scripts passed syntax validation"

  molecule-test:
    name: Molecule Test
    needs: validate
    uses: ./.github/workflows/reusable-molecule-test-windows.yml
    with:
      distros: |
        [
          {"name": "WindowsServer2022", "image_owner": "801119661308", "image_arch": "x86_64", "image_name": "Windows_Server-2022-English-Full-Base-*", "instance_type": "t3a.medium"}
        ]
      collection_role: pwsh_install_ccid
      pr_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
      pr_repo: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || '' }}
    secrets: inherit
